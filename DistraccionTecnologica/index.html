<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distracciones en la Conducción</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-hover-border: rgba(99, 102, 241, 0.4);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      --modal-bg: rgba(15, 23, 42, 0.95);
      --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      text-align: center;
    }

    header {
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.8s ease-out;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
    }

    .instruction {
      font-size: 1rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.05);
      letter-spacing: 0.02em;
    }

    /* Grid de Tarjetas */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 3rem 2rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-gradient);
      opacity: 0;
      transition: var(--transition);
      z-index: 0;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: var(--card-hover-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(99, 102, 241, 0.1);
    }

    .card:hover::before {
      opacity: 0.03;
    }

    .card-icon {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      color: var(--accent);
      transition: var(--transition);
      z-index: 1;
    }

    .card:hover .card-icon {
      background: var(--accent);
      color: white;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-main);
      z-index: 1;
      letter-spacing: -0.02em;
    }

    /* Modal / Ventana Emergente */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 9, 25, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 1.5rem;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-wrapper {
      background: #15172c;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 3rem;
      max-width: 650px;
      width: 100%;
      position: relative;
      transform: scale(0.9) translateY(20px);
      transition: var(--transition);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    }

    .modal-overlay.active .modal-wrapper {
      transform: scale(1) translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: #ef4444;
      transform: rotate(90deg);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .modal-tag {
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #818cf8;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .modal-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .modal-body {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    /* Animaciones */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 640px) {
      body { padding: 1rem; }
      h1 { font-size: 2rem; }
      .modal-wrapper { padding: 2rem 1.5rem; border-radius: 24px; }
      .modal-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Tipos de Distracciones en la Conducción</h1>
      <p class="instruction">Haga clic sobre las tarjetas para ampliar la información</p>
    </header>

    <div class="cards-grid">
      <div class="card" onclick="openModal('visual')" role="button" tabindex="0">
        <div class="card-icon">👁️</div>
        <h2>Distracción Visual</h2>
      </div>

      <div class="card" onclick="openModal('manual')" role="button" tabindex="0">
        <div class="card-icon">✋</div>
        <h2>Distracción Manual</h2>
      </div>

      <div class="card" onclick="openModal('cognitiva')" role="button" tabindex="0">
        <div class="card-icon">🧠</div>
        <h2>Distracción Cognitiva</h2>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
    <div class="modal-wrapper" id="modalWrapper" role="dialog" aria-modal="true">
      <button class="modal-close" onclick="closeModal()" aria-label="Cerrar ventana">&times;</button>
      <div class="modal-header">
        <span class="modal-tag">Factores de Riesgo</span>
      </div>
      <h2 class="modal-title" id="modalTitle">Título</h2>
      <div class="modal-body" id="modalBody">
        Contenido...
      </div>
    </div>
  </div>

  <script>
    // Banco de datos extraído directamente de la información provista
    const contentData = {
      visual: {
        title: "La distracción visual",
        text: "Definida como el desvío de la mirada de la carretera hacia otra fuente de información, es una de las más prevalentes. (Kahneman, 1973), en su modelo de atención y recursos limitados, señaló que la percepción visual requiere una asignación significativa de recursos cognitivos, lo que reduce la capacidad de procesamiento de otras tareas simultáneas. En el contexto de la conducción, mirar un mapa en un sistema de navegación o leer un mensaje en una pantalla táctil puede limitar drásticamente la capacidad del conductor para identificar peligros, como peatones cruzando inesperadamente o un vehículo frenando de manera abrupta. Según la National Highway Traffic Safety Administration (NHTSA, 2021), mirar una pantalla durante solo 5 segundos mientras se conduce a 90 km/h equivale a recorrer más de 120 metros sin prestar atención a la carretera. Este fenómeno ilustra cómo la distracción visual compromete directamente la capacidad de respuesta del conductor."
      },
      manual: {
        title: "La distracción manual",
        text: "Ocurre cuando el conductor retira una o ambas manos del volante para realizar una tarea secundaria, como ajustar el sistema de entretenimiento o responder un mensaje de texto. Este tipo de distracción afecta el control físico del vehículo y limita la capacidad de realizar maniobras evasivas. La teoría de los recursos múltiples de (Wickens, 2008) explica que cuando las tareas demandan recursos del mismo canal (en este caso, el motor y el visual), el rendimiento decrece significativamente. Por ejemplo, un conductor que usa una mano para manipular el sistema de aire acondicionado en una carretera con tráfico denso podría no reaccionar a tiempo ante un frenado brusco del vehículo delantero, aumentando el riesgo de una colisión por alcance."
      },
      cognitiva: {
        title: "La distracción cognitiva",
        text: "Menos evidente pero igualmente peligrosa, se produce cuando el conductor está mentalmente absorto en una tarea secundaria, como planificar una ruta o sostener una conversación telefónica, en lugar de centrarse en el entorno vial. Según (Kahneman, 1973), la atención es un recurso limitado, y cuando se divide entre múltiples tareas, el rendimiento en ambas se ve afectado. En el contexto de la conducción, esto significa que el conductor puede no percibir señales importantes, como un ciclista ingresando a una intersección. (Strayer, et al., 2013) compararon los efectos de la distracción cognitiva con los de la conducción bajo los efectos del alcohol, encontrando tiempos de reacción similares en ambos casos, lo que subraya la gravedad de esta forma de distracción."
      }
    };

    const overlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');

    // Abre el modal cargando la información correspondiente
    function openModal(key) {
      const data = contentData[key];
      if (!data) return;

      modalTitle.innerText = data.title;
      modalBody.innerText = data.text;
      
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden'; // Previene scroll de fondo
      
      // Enfoca el modal por accesibilidad
      document.getElementById('modalWrapper').focus();
    }

    // Cierra el modal de forma limpia
    function closeModal() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Cierra el modal si se hace clic fuera del contenedor principal
    function handleOverlayClick(event) {
      if (event.target === overlay) {
        closeModal();
      }
    }

    // Manejo de eventos de teclado (Escape, Espacio, Enter)
    document.addEventListener('keydown', function(event) {
      if (overlay.classList.contains('active')) {
        if (event.key === 'Escape' || event.key === ' ' || event.key === 'Enter') {
          event.preventDefault(); // Previene comportamientos por defecto como scroll con la barra espaciadora
          closeModal();
        }
      }
    });

    // Permite abrir las tarjetas usando el teclado (Enter / Espacio) cuando están enfocadas
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          this.click();
        }
      });
    });
  </script>
</body>
</html>
