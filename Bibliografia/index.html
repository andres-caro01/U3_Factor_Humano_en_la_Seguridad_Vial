<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliografía - Movilidad Inteligente y Automatización</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-base: #27728F; 
            --accent-bright: #4ce3ff; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(39, 114, 143, 0.3);
            --text-main: #ffffff;
            --text-dim: #cce9f5;
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background-color: #030a0d;
            color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; cursor: default;
        }

        #custom-cursor-tool {
            position: fixed; pointer-events: none;
            background: var(--accent-bright); color: #000;
            padding: 5px 12px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700;
            z-index: 9999; display: none;
            transform: translate(15px, 15px);
            box-shadow: 0 0 15px var(--accent-bright);
        }

        .fluid-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #05131a; filter: blur(80px);
        }
        .fluid-layer { position: absolute; border-radius: 50%; opacity: 0.35; animation: fluidMove infinite alternate ease-in-out; }
        .layer-1 { background: radial-gradient(circle, var(--accent-base) 0%, transparent 70%); width: 100vw; height: 100vw; top: -30%; left: -10%; animation-duration: 20s; }
        .layer-2 { background: radial-gradient(circle, #0e303d 0%, transparent 70%); width: 80vw; height: 80vw; bottom: -20%; right: -10%; animation-duration: 25s; }
        @keyframes fluidMove { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(10%, 5%) scale(1.1); } }

        .nav-instruction {
            width: 90vw; max-width: 1400px;
            background: rgba(39, 114, 143, 0.15);
            border: 1px dashed var(--accent-bright);
            padding: 15px; border-radius: 12px;
            margin-top: 30px;
            text-align: center;
            font-size: 0.9rem; color: var(--accent-bright);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .main-header { text-align: center; padding: 30px 20px; z-index: 1; }
        .main-header h1 { font-weight: 300; font-size: 2rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-header .line { width: 60px; height: 3px; background: var(--accent-bright); margin: 15px auto; }

        .reference-grid {
            display: grid; width: 90vw; max-width: 1400px;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px; padding-bottom: 80px; z-index: 1;
        }

        .card {
            font-family: 'Poppins', sans-serif;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 25px;
            display: flex; flex-direction: column;
            transition: all 0.3s ease;
            min-height: 190px;
        }
        .card:hover { border-color: var(--accent-bright); transform: translateY(-5px); background: rgba(39, 114, 143, 0.08); box-shadow: 0 10px 20px rgba(39, 114, 143, 0.15); }

        .author-tag { font-size: 0.75rem; font-weight: 600; color: var(--accent-bright); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        .title { font-size: 0.9rem; font-weight: 400; line-height: 1.6; color: var(--text-main); margin-bottom: 15px; }

        .footer-info {
            font-size: 0.75rem; font-weight: 300; color: var(--text-dim);
            border-top: 1px solid rgba(39, 114, 143, 0.2);
            padding-top: 15px; margin-top: auto;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-visit { font-family: 'Poppins', sans-serif; text-decoration: none; background: var(--accent-bright); color: #000; padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; transition: background 0.2s; }
        .btn-visit:hover { background: #fff; }
        .btn-copy { font-family: 'Poppins', sans-serif; background: transparent; border: 1px solid var(--accent-bright); color: var(--accent-bright); padding: 6px 12px; border-radius: 6px; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn-copy:hover { background: var(--accent-bright); color: #000; }
        
    </style>
</head>
<body>

    <div id="custom-cursor-tool">¡Enlace Copiado!</div>

    <div class="fluid-background">
        <div class="fluid-layer layer-1"></div>
        <div class="fluid-layer layer-2"></div>
    </div>

    <div class="nav-instruction">
        🤖 <b>Instrucción de Navegación:</b> Explora las referencias sobre analítica de datos, sistemas de transporte inteligente y psicología del conductor. Usa los accesos digitales dinámicos según estén disponibles.
    </div>

    <header class="main-header">
        <h1>BIBLIOGRAFÍA</h1>
        <div class="line"></div>
    </header>

    <main class="reference-grid" id="grid"></main>

    <script>
        const sources = [
            { a: "Aziz, H. M. A., Ukkusuri, S. V. & Hasan, S. (2021)", t: "Big data and machine learning in smart transportation", f: "Transportation Research Part C: Emerging Technologies, Vol. 125, p. 103056", u: null },
            { a: "Baddeley, A. D. (1992)", t: "Working memory", f: "Science, 255(5044), pp. 556-559", u: null },
            { a: "Bertsimas, D. & Dunn, J. (2017)", t: "Machine learning under a modern optimization lens", f: "s.l.: Dynamic Ideas", u: null },
            { a: "Buehler, R. & Dill, J. (2016)", t: "Bikeway networks: A review of effects on cycling", f: "Transport Reviews, 36(1), pp. 9-27", u: null },
            { a: "Buehler, R. & Pucher, J. (2021)", t: "Cycling for sustainable cities", f: "s.l.: MIT Press", u: null },

            { a: "Chen, F., Zheng, Z., Feng, Y. & Zhang, Y. (2017)", t: "Application of big data in traffic safety and transportation", f: "Journal of Advanced Transportation, pp. 1-10", u: null },
            { a: "Cookson, R. E., Richards, D. C. & Cuerden, R. W. (2011)", t: "The characteristics of pedestrian road traffic accidents and the resulting injuries", f: "Crowthorne: s.n.", u: null },
            { a: "Dey, D. y otros. (2020)", t: "Communicating the intention of an automated vehicle to pedestrians: The contributions of eHMI and vehicle behavior", f: "it — Information Technology, 63(2), p. 123–141", u: null },
            { a: "Endsley, M. R. (1995)", t: "Toward a theory of situation awareness in dynamic systems", f: "Human Factors, 37(1), pp. 32-64", u: null },
            { a: "Endsley, M. R. (2017)", t: "Designing for situation awareness: An approach to user-centered design (2nd ed.)", f: "s.l.: CRC Press", u: null },
            { a: "Endsley, M. R. (2018)", t: "Autonomous driving systems: The role of human operators", f: "Human Factors, 60(1), pp. 1-5", u: null },
            { a: "Ferreira, J. & Pereira, F. C. (2017)", t: "Mobility patterns and urban planning", f: "Journal of Urban Planning and Development, 143(4), p. 04017012", u: null },
            { a: "Hancock, P. A., Wulf, G., Thom, D. & Fassnacht, P. (1990)", t: "Driver workload during differing driving maneuvers", f: "Accident Analysis & Prevention, 22(3), pp. 281-290", u: null },
            { a: "Hassenzahl, M. (2008)", t: "User experience (UX): Towards an experiential perspective on product quality", f: "s.l., ACM, pp. 11-15", u: null },
            { a: "Hatfield, J. & Murphy, S. (2007)", t: "The effects of mobile phone use on pedestrian crossing behaviour at signalised and unsignalised intersections", f: "Accident Analysis & Prevention, 39(1), p. 197–205", u: null },
            { a: "Hsu, T.-P., Wen, K.-L. & Zhang, T. (2025)", t: "Effect Assessment of a Motorcycle Collision Warning System at Intersections", f: "Journal of Transportation Engineering, Part A: Systems, Vol. 151", u: null },
            { a: "Huertas-Leyva, P. y otros. (2019)", t: "Emergency braking performance of motorcycle riders: skill identification in a real-life perception-action task designed for training purposes", f: "Transportation Research Part F: Traffic Psychology and Behaviour, Vol. 63, p. 121–133", u: null },
            { a: "Hurt, H. H., Ouellet, J. V. & Thom, D. R. (1981)", t: "Motorcycle accident cause factors and identification of countermeasures, Volume 1: Technical report", f: "Traffic Safety Center, University of Southern California", u: null },
            { a: "Hussain, R., Shafiq, M. & Alshamrani, S. (2020)", t: "Internet of Things and vehicular ad hoc networks: Technologies and applications", f: "Computers & Electrical Engineering, Vol. 81, p. 106534", u: null },
            { a: "Kahneman, D. (1973)", t: "Attention and effort", f: "s.l.: Prentice-Hall", u: null },
            { a: "Lee, J. D. & See, K. A. (2004)", t: "Trust in automation: Designing for appropriate", f: "Human Factors, 46(1), pp. 50-80", u: null },

            { a: "Litman, T. (2022)", t: "Autonomous vehicle implementation predictions: Implications for transport planning", f: "s.l.: Victoria Transport Policy Institute", u: null },
            { a: "Nasar, J. L. & Troyer, D. (2013)", t: "Pedestrian injuries due to mobile phone use in public places", f: "Accident Analysis & Prevention, Vol. 57, p. 91–95", u: null },
            { a: "National Center for Statistics and Analysis (2015)", t: "Critical reasons for crashes investigated in the National Motor Vehicle Crash Causation Survey", f: "NHTSA", u: null },
            { a: "NCSA (2023)", t: "Pedestrians: 2021 data (Traffic Safety Facts)", f: "National Highway Traffic Safety Administration", u: null },
            { a: "Nielsen, J. (1993)", t: "Usability Engineering", f: "Boston: Academic Press", u: null },
            { a: "Pai, C. W. (2011)", t: "Motorcycle right-of-way accidents. A literature review", f: "Accident Analysis & Prevention, 43(3), p. 971–982", u: null },
            { a: "Parasuraman, R. & Riley, V. (1997)", t: "Humans and automation: Use, misuse, disuse, abuse", f: "Human Factors, 39(2), p. 230–253", u: null },
            { a: "Rizzi, M. y otros. (2015)", t: "Effectiveness of motorcycle antilock braking systems (ABS) in reducing crashes, the first cross-national study", f: "Traffic Injury Prevention, 16(2), p. 177–183", u: null },
            { a: "SAE (2018)", t: "Taxonomy and definitions for terms related to driving automation systems for on-road motor vehicles", f: "s.l.: SAE", u: null },
            { a: "Salvucci, D. D. & Taatgen, N. A. (2008)", t: "The multitasking mind", f: "s.l.: Oxford University Press", u: null },
            { a: "Schwebel, D. C. y otros. (2021)", t: "Reducing distracted pedestrian behavior using Bluetooth beacon technology: A crossover trial", f: "Accident Analysis & Prevention, Vol. 159, p. 106253", u: null },
            { a: "Schwebel, D. C. y otros. (2012)", t: "Distraction and pedestrian safety: How talking on the phone, texting, and listening to music impact crossing the street", f: "Accident Analysis & Prevention, Vol. 45, p. 266–271", u: null },
            { a: "Shaheen, S., Cohen, A. & Zohdy, I. (2016)", t: "Shared mobility: Current practices and guiding principles", f: "s.l.: Department of Transportation", u: null },
            { a: "Shi, Q. & Abdel-Aty, M. (2020)", t: "Review on big data applications in safety research of intelligent transportation systems and connected/automated vehicles", f: "Accident Analysis & Prevention, Vol. 146, p. 105733", u: null },
            { a: "Shladover, S. E. (2018)", t: "Connected and automated vehicle systems: Introduction and overview", f: "Journal of Intelligent Transportation Systems, 22(3), p. 190–200", u: null },
            { a: "Shneiderman, B. y otros. (2017)", t: "Designing the User Interface: Strategies for Effective Human-Computer Interaction (6th ed.)", f: "s.l.: Pearson", u: null },
            { a: "Strayer, D. L. y otros. (2015)", t: "Assessing cognitive distraction in the automobile", f: "Human Factors, 57(8), p. 1300–1324", u: null },
            { a: "Strayer, D. L., Watson, J. M. & Drews, F. A. (2013)", t: "Cognitive distraction while multitasking in the automobile", f: "Psychological Science, 24(5), pp. 551-559", u: null },
            { a: "SWOV (2020)", t: "Infrastructure for pedestrians and cyclists", f: "SWOV — Institute for Road Safety Research", u: null },
            { a: "Teoh, E. R. (2011)", t: "Effectiveness of anti-lock braking systems in reducing motorcycle fatal crash rates", f: "Traffic Injury Prevention, 12(2), p. 169–173", u: null },
            { a: "Thompson, C., Wiegand, D. & Gibbons, M. (2013)", t: "Impact of fatigue and stress on traffic safety", f: "Traffic Injury Prevention, 14(2), p. 167–174", u: null },
            { a: "Waymo (2022)", t: "How Waymo communicates with people on the road", f: "Waymo Blog", u: "https://waymo.com/blog/" },
            { a: "Wickens, C. D. (2008)", t: "Multiple resources and mental workload", f: "Human Factors, 50(3), p. 449–455", u: null },
            { a: "Wickens, C. D., Hollands, J. G., Banbury, S. & Parasuraman, R. (2013)", t: "Engineering psychology and human performance", f: "s.l.: Pearson Education", u: null },
            { a: "Young, M. S. & Stanton, N. A. (2007)", t: "What's skill got to do with it? Vehicle automation and driver mental workload", f: "Ergonomics, 50(8), p. 1324–1339", u: null },
            { a: "Young, M. S., Stanton, N. A. & Harris, D. (2020)", t: "Human factors and road safety: Design and evaluation principles", f: "Ergonomics, 63(8), pp. 1018-1032", u: null }
        ];

        const grid = document.getElementById('grid');
        const tool = document.getElementById('custom-cursor-tool');

        document.addEventListener('mousemove', (e) => {
            tool.style.left = e.clientX + 'px';
            tool.style.top = e.clientY + 'px';
        });

        sources.forEach((s) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let html = `
                <div class="author-tag">${s.a}</div>
                <div class="title">${s.t}</div>
                <div class="footer-info">${s.f}</div>
            `;

            if(s.u) {
                html += `
                    <div class="btn-group">
                        <a href="${s.u}" target="_blank" class="btn-visit">Visitar</a>
                        <button class="btn-copy" onclick="copyLink('${s.u}')">Copiar Link</button>
                    </div>
                `;
            }

            card.innerHTML = html;
            grid.appendChild(card);
        });

        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                tool.style.display = 'block';
                setTimeout(() => { tool.style.display = 'none'; }, 1500);
            });
        }
    </script>
</body>
</html>
